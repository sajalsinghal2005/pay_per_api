<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | Pay Per API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="signup">
  <div class="page-shell d-flex align-items-center justify-content-center min-vh-100 px-3">
    <div class="content-card shadow-lg p-5 rounded-4 bg-white border border-1 form-card">
      <div class="text-center mb-4">
        <div class="badge bg-primary text-white mb-3">Pay Per API</div>
        <h1 class="h3 section-title">Create your account</h1>
        <p class="text-secondary">Signup to start using the weather API and manage your credits.</p>
      </div>
      <div id="page-alert" class="alert-box"></div>
      <form id="signup-form" class="row g-3">
        <div class="col-md-6">
          <label for="signup-first-name" class="form-label">First name</label>
          <input type="text" id="signup-first-name" class="form-control form-control-lg" required placeholder="First name" />
        </div>
        <div class="col-md-6">
          <label for="signup-last-name" class="form-label">Last name</label>
          <input type="text" id="signup-last-name" class="form-control form-control-lg" required placeholder="Last name" />
        </div>
        <div class="col-12">
          <label for="signup-email" class="form-label">Email</label>
          <input type="email" id="signup-email" class="form-control form-control-lg" required placeholder="you@example.com" />
        </div>
        <div class="col-12">
          <label for="signup-password" class="form-label">Password</label>
          <div class="input-group">
            <input type="password" id="signup-password" class="form-control form-control-lg" required placeholder="Create a strong password" />
            <button type="button" class="btn btn-outline-secondary" onclick="const input=document.getElementById('signup-password');input.type=input.type==='password'?'text':'password';">Show</button>
          </div>
        </div>
        <div class="col-12 d-grid mt-3">
          <button id="signup-button" class="btn btn-primary btn-lg">Signup</button>
        </div>
      </form>
      <div class="text-center mt-4 text-muted">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
