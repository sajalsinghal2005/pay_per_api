<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Pay Per API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login">
  <div class="page-shell d-flex align-items-center justify-content-center min-vh-100 px-3">
    <div class="content-card shadow-lg p-5 rounded-4 bg-white border border-1 form-card">
      <div class="text-center mb-4">
        <div class="badge bg-primary text-white mb-3">Pay Per API</div>
        <h1 class="h3 section-title">Welcome back</h1>
        <p class="text-secondary">Login to access your dashboard and call the weather API.</p>
      </div>
      <div id="page-alert" class="alert-box"></div>
      <form id="login-form" class="row g-3">
        <div class="col-12">
          <label for="login-email" class="form-label">Email</label>
          <input type="email" id="login-email" class="form-control form-control-lg" required placeholder="you@example.com" />
        </div>
        <div class="col-12">
          <label for="login-password" class="form-label">Password</label>
          <div class="input-group">
            <input type="password" id="login-password" class="form-control form-control-lg" required placeholder="Enter your password" />
            <button type="button" class="btn btn-outline-secondary" onclick="const input=document.getElementById('login-password');input.type=input.type==='password'?'text':'password';">Show</button>
          </div>
        </div>
        <div class="col-12 d-grid mt-3">
          <button id="login-button" class="btn btn-primary btn-lg">Login</button>
        </div>
      </form>
      <div class="text-center mt-4 text-muted">
        New to Pay Per API? <a href="signup.html">Create an account</a>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
