<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Pay Per API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login" class="bg-surface">
  <nav class="navbar navbar-expand-lg navbar-dark navbar-glass py-3">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Pay Per API</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card rounded-4 shadow-lg border-0 overflow-hidden">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <span class="eyebrow text-primary d-inline-flex mb-2">Secure login</span>
              <h1 class="h3 fw-bold">Welcome back</h1>
              <p class="text-muted mb-0">Login to manage your credits and request weather data.</p>
            </div>
            <div id="page-alert" class="alert-box"></div>
            <form id="login-form" class="row g-3">
              <div class="col-12">
                <label for="login-email" class="form-label">Email</label>
                <input type="email" id="login-email" class="form-control form-control-lg rounded-pill" required placeholder="you@example.com" />
              </div>
              <div class="col-12">
                <label for="login-password" class="form-label">Password</label>
                <div class="input-group input-group-lg rounded-pill overflow-hidden border border-1">
                  <input type="password" id="login-password" class="form-control border-0" required placeholder="Enter your password" />
                  <button type="button" class="btn btn-outline-secondary rounded-pill" onclick="const input=document.getElementById('login-password'); input.type=input.type==='password'?'text':'password';">Show</button>
                </div>
              </div>
              <div class="col-12 d-grid mt-4">
                <button id="login-button" class="btn btn-primary btn-lg rounded-pill">Login</button>
              </div>
            </form>
            <div class="text-center mt-4 text-muted">
              New to Pay Per API? <a href="signup.html">Create an account</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
