<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Pay Per API</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="signup">
  <div class="auth-shell">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p>Get your API key and start tracking usage.</p>
      <form id="signup-form" class="form-grid" autocomplete="off">
        <label>First Name</label>
        <input type="text" id="signup-firstName" placeholder="First Name" required autocomplete="off" />

        <label>Last Name</label>
        <input type="text" id="signup-lastName" placeholder="Last Name" required autocomplete="off" />

        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="off" />

        <label>Password</label>
        <div class="password-field">
          <input type="password" id="signup-password" placeholder="Create a password" required autocomplete="new-password" />
          <button type="button" class="icon-button" id="toggle-signup-password">👁</button>
        </div>

        <button class="button button-primary" type="submit">Sign Up</button>
      </form>
      <p class="page-note">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
